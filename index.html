<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revelación de Género | Johanna y Harold</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --pink: #ffb6c1;
            --blue: #add8e6;
            --dark: #4a3728; 
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-image: url('fondo.jpg'); 
            background-size: cover;
            background-position: center top;
            background-attachment: scroll; 
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        
        body.locked { overflow: hidden; }

        /* PANTALLA DE BIENVENIDA */
        .welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('abrir.png'); 
            background-size: cover;
            background-position: center;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .seal-button {
            position: absolute;
            top: 54%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px; 
            height: 130px;
            background: rgba(255, 255, 255, 0); 
            border-radius: 50%; 
            border: none;
            cursor: pointer;
            outline: none;
            z-index: 10000;
        }

        .welcome-action {
            position: absolute;
            bottom: 8vh;
            text-align: center;
            width: 100%;
        }

        .volume-hint {
            background: rgba(255, 255, 255, 0.85);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            color: var(--dark);
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            backdrop-filter: blur(5px);
            font-size: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            background: transparent; 
            padding: 15px;
            max-width: 500px;
            width: 92%;
            margin-top: 25vh; 
            margin-bottom: 25vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 { font-size: 2.2rem; margin-bottom: 5px; color: var(--dark); text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        h2 { font-size: 1.1rem; font-weight: normal; color: #7a6352; margin-bottom: 25px; }
        .names { font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; }
        
        .audio-player { margin-bottom: 20px; width: 100%; max-width: 250px; border-radius: 30px; opacity: 0.85; height: 40px; }

        .media-gallery { display: flex; flex-direction: column; gap: 15px; margin: 0 auto 25px; width: 100%; }
        .media-gallery img, .media-gallery video { width: 100%; border-radius: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.15); object-fit: cover; }

        .details { margin: 25px 0; padding: 15px; background: rgba(255, 255, 255, 0.6); border-radius: 15px; font-size: 1rem; line-height: 1.5; width: 100%; backdrop-filter: blur(3px); }
        .dress-code { font-style: italic; font-weight: bold; margin-top: 15px; color: #d63384; }
        
        .map-link { display: inline-block; margin-top: 10px; color: #d63384; font-weight: bold; text-decoration: none; padding: 5px 10px; border: 2px solid #d63384; border-radius: 15px; transition: background 0.3s, color 0.3s; }
        .map-link:hover { background: #d63384; color: white; }
